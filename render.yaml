services:
  - type: web
    name: financial-app
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health/
    envVars:
      - key: LEDGERLIFT_API_BASE_URL
        value: /api
      - key: LEDGERLIFT_INTERNAL_API_BASE_URL
        value: http://127.0.0.1:8001/api
      - key: DJANGO_DEBUG
        value: 0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: LEDGER_CHAIN_SECRET
        generateValue: true
      - key: LEDGER_CHAIN_KEY_ID
        value: render-primary
      - key: NIRA_API_BASE_URL
        value: ""
      - key: NIRA_API_KEY
        value: ""
      - key: NITA_API_BASE_URL
        value: ""
      - key: NITA_API_KEY
        value: ""
      - key: UGANDA_IDENTITY_API_TIMEOUT
        value: "8"
      - key: DJANGO_ALLOWED_HOSTS
        value: financial-app.onrender.com,127.0.0.1,localhost
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://financial-app.onrender.com,https://ledgerlift-uganda-demo.onrender.com
      - key: LEDGERLIFT_ALLOWED_ORIGINS
        value: https://financial-app.onrender.com,https://ledgerlift-uganda-demo.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: ledgerlift-uganda-db
          property: connectionString

databases:
  - name: ledgerlift-uganda-db
    plan: free
    databaseName: ledgerlift_uganda
    user: ledgerlift_uganda