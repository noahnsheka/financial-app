services:
  - type: static
    name: ledgerlift-uganda-demo
    buildCommand: echo "static site ready"
    staticPublishPath: docs

  - type: web
    name: ledgerlift-uganda-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py seed_demo_data && python manage.py collectstatic --noinput
    startCommand: gunicorn ledgerlift_backend.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_DEBUG
        value: 0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ledgerlift-uganda-api.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://ledgerlift-uganda-api.onrender.com,https://ledgerlift-uganda-demo.onrender.com
      - key: LEDGERLIFT_ALLOWED_ORIGINS
        value: https://ledgerlift-uganda-demo.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: ledgerlift-uganda-db
          property: connectionString

databases:
  - name: ledgerlift-uganda-db